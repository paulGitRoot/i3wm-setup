backend = "glx";
vsync = true;

# Reduce tearing / improve smoothness
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# Disable ALL blur (this is important)
blur-method = "none";

# Fade settings (optional, smoother transitions)
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Shadow (optional, safe)
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.25;
shadow-offset-x = -7;
shadow-offset-y = -7;

# Prevent weird artifacts
detect-client-opacity = true;
